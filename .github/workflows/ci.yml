name: Notes App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: "notes-app"
  APP_VERSION: "1.0.0"
  AWS_REGION: "eu-west-1"
  EKS_CLUSTER_NAME: "notes-app-production"
  EKS_APP_NAMESPACE: "notes-app"

jobs:
  ############################################
  # STAGE 1: BUILD
  ############################################
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: |
          node -c app.js
          node -c tasks.js

  ############################################
  # STAGE 2: TEST
  ############################################
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: npm install

      - name: Run tests
        run: npm test

  ############################################
  # STAGE 3: SECURITY
  ############################################
  security-secrets-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --redact \
            --exit-code 1

  security-dependencies-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Audit dependencies
        run: npm audit --audit-level=high

  ############################################
  # STAGE 4: PACKAGE (Docker)
  ############################################
  package-docker:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t $APP_NAME:$APP_VERSION .
          docker tag $APP_NAME:$APP_VERSION ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:$APP_VERSION
          docker tag $APP_NAME:$APP_VERSION ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:$APP_VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest

  ############################################
  # STAGE 5: STAGING (EC2 + Terraform)
  ############################################
deploy-staging:
  runs-on: ubuntu-latest
  needs: package-docker
  if: github.ref == 'refs/heads/main'

  defaults:
    run:
      working-directory: terraform/aws-staging

  steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Cleanup old staging EC2 instances
      run: |
        INSTANCE_IDS=$(aws ec2 describe-instances \
          --region "$AWS_REGION" \
          --filters "Name=tag:Environment,Values=staging" \
                    "Name=tag:Project,Values=notes-app" \
                    "Name=instance-state-name,Values=pending,running,stopping,stopped" \
          --query 'Reservations[*].Instances[*].InstanceId' \
          --output text)

        if [ -n "$INSTANCE_IDS" ] && [ "$INSTANCE_IDS" != "None" ]; then
          echo "Terminating old staging instances: $INSTANCE_IDS"
          aws ec2 terminate-instances \
            --region "$AWS_REGION" \
            --instance-ids $INSTANCE_IDS

          echo "Waiting for instances to terminate..."
          aws ec2 wait instance-terminated \
            --region "$AWS_REGION" \
            --instance-ids $INSTANCE_IDS
        else
          echo "No old staging instances found."
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

    - name: Cleanup old staging key pairs
      run: |
        KEY_NAMES=$(aws ec2 describe-key-pairs \
          --region "$AWS_REGION" \
          --query 'KeyPairs[?starts_with(KeyName, `notes-app-key-`)].KeyName' \
          --output text)

        if [ -n "$KEY_NAMES" ] && [ "$KEY_NAMES" != "None" ]; then
          for KEY in $KEY_NAMES; do
            echo "Deleting key pair: $KEY"
            aws ec2 delete-key-pair \
              --region "$AWS_REGION" \
              --key-name "$KEY"
          done
        else
          echo "No old staging key pairs found."
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

    - name: Cleanup old staging security groups
      run: |
        SG_IDS=$(aws ec2 describe-security-groups \
          --region "$AWS_REGION" \
          --query 'SecurityGroups[?starts_with(GroupName, `notes-app-staging-sg-`)].GroupId' \
          --output text)

        if [ -n "$SG_IDS" ] && [ "$SG_IDS" != "None" ]; then
          for SG in $SG_IDS; do
            echo "Deleting security group: $SG"
            aws ec2 delete-security-group \
              --region "$AWS_REGION" \
              --group-id "$SG" || echo "Could not delete $SG yet"
          done
        else
          echo "No old staging security groups found."
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: |
        terraform apply -auto-approve \
          -var="docker_image=${{ secrets.DOCKER_USERNAME }}/notes-app" \
          -var="docker_tag=${{ env.APP_VERSION }}" \
          -var="registry_user=${{ secrets.DOCKER_USERNAME }}" \
          -var="registry_password=${{ secrets.DOCKER_PASSWORD }}"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

    - name: Show staging public IP
      run: terraform output staging_public_ip

    - name: Show staging URL
      run: terraform output staging_url
  ############################################
  # STAGE 6: PRODUCTION EKS INFRA
  ############################################
  deploy-production-eks-infra:
    runs-on: ubuntu-latest
    needs: package-docker
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: terraform/aws-production-eks-infra

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Wait for EKS cluster to become ACTIVE
        run: |
          aws eks wait cluster-active \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Show cluster name
        run: terraform output cluster_name

  ############################################
  # STAGE 7: PRODUCTION APP ON KUBERNETES
  ############################################
  deploy-production-eks-app:
    runs-on: ubuntu-latest
    needs: deploy-production-eks-infra
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: terraform/aws-production-eks-app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Verify cluster access
        run: kubectl get nodes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="docker_image=${{ secrets.DOCKER_USERNAME }}/notes-app" \
            -var="docker_tag=${{ env.APP_VERSION }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

      - name: Verify deployment
        run: |
          kubectl get deployments -n "$EKS_APP_NAMESPACE"
          kubectl get pods -n "$EKS_APP_NAMESPACE"
          kubectl get svc -n "$EKS_APP_NAMESPACE"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
