name: Notes App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  APP_NAME: "notes-app"
  APP_VERSION: "1.0.0"

jobs:

############################################
# STAGE 1: BUILD
############################################
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: |
          node -c app.js
          node -c tasks.js

############################################
# STAGE 2: TEST
############################################
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - name: Run tests
        run: npm test

############################################
# STAGE 3: SECURITY
############################################
  security-secrets-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm -v ${{ github.workspace }}:/repo \
          zricethezav/gitleaks:latest detect \
          --source=/repo \
          --redact \
          --exit-code 1

  security-dependencies-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: npm audit --audit-level=high

############################################
# STAGE 4: PACKAGE (Docker)
############################################
  package-docker:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t $APP_NAME:$APP_VERSION .
          docker tag $APP_NAME:$APP_VERSION ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:$APP_VERSION
          docker tag $APP_NAME:$APP_VERSION ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:$APP_VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest

############################################
# STAGE 5: DEPLOY WITH TERRAFORM
############################################
  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: package-docker
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: terraform/aws-staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="docker_image=${{ secrets.DOCKER_USERNAME }}/notes-app" \
            -var="docker_tag=${{ env.APP_VERSION }}" \
            -var="registry_user=${{ secrets.DOCKER_USERNAME }}" \
            -var="registry_password=${{ secrets.DOCKER_PASSWORD }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Show Public IP
        run: terraform output staging_public_ip
